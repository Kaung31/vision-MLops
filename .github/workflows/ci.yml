name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: lint + types + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment (Python 3.12 + dev tools)
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -q
