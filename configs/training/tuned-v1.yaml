# PROMOTED (Phase 4): champion's SMALL model + the augmentation the nano search found. This
# won the transfer study — beat champion-v1 in-distribution (0.601 -> 0.630) AND on the hardest
# cross-dataset slice (RainSnow 0.096 -> 0.117, non-overlapping CIs), so it is now the config
# all future retraining uses. Evidence: reports/tuned-v1/, docs/experiments/tuning.md.
#
# lr0/lrf are deliberately ABSENT: they were in the search space but Ultralytics'
# optimizer="auto" overrode them (all 14 trials ran at auto's lr — the winning trial had the
# LOWEST lr0 tried, proof it was ignored). So this is auto-lr + tuned augmentation, honestly.

model: yolov8s.pt        # SMALL — same as champion-v1, so the comparison is like-for-like
data_version: train-v1
imgsz: 640
epochs: 100
batch: 16
patience: 20
seed: 0
fraction: 1.0

# Tuned knobs that actually took effect (best nano trial, val mAP50-95 0.6931). Applied over
# the base train() call via run.py's `overrides` mechanism.
overrides:
  weight_decay: 0.000883
  warmup_epochs: 0.5662
  mosaic: 0.9879
  mixup: 0.2944
  hsv_h: 0.09925
  hsv_s: 0.5387
  hsv_v: 0.7872

diagnose:
  overfit_rebound: 0.20
  min_learn_frac: 0.05
  window: 5
  floor_map50_95: 0.381
